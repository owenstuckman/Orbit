project_id = "iioocrhatrimnsrapphv"

[auth]
site_url = "https://orbit-sandy.vercel.app"
additional_redirect_urls = ["com.orbit.app://login-callback", "https://orbit-sandy.vercel.app/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email.template.confirmation]
subject = "Confirm your Orbit email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Orbit password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.invite]
subject = "You have been invited to Orbit"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your Orbit email change"
content_path = "./supabase/templates/email-change.html"
